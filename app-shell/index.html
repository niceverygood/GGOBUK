<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>꼬북점</title>
    <style>
      :root {
        color: #23313e;
        background: #faf6f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo",
          sans-serif;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18px 18px, rgba(44, 62, 80, 0.05) 1.5px, transparent 1.5px),
          linear-gradient(135deg, #f3ece1 0%, #fff9ee 48%, #e8f7f5 100%);
        background-size: 24px 24px, 100% 100%;
      }

      main {
        width: min(320px, calc(100vw - 40px));
        padding: 32px 24px;
        border: 1px solid rgba(44, 62, 80, 0.12);
        border-radius: 28px;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: 0 18px 48px rgba(44, 62, 80, 0.12);
        text-align: center;
      }

      img {
        width: 112px;
        height: 112px;
        border-radius: 28px;
        box-shadow: 0 12px 28px rgba(44, 62, 80, 0.1);
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #7d756b;
        font-size: 15px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="꼬북점" />
      <h1>꼬북점</h1>
      <p>네트워크를 확인하고 다시 열어주세요. 곧 등껍질 풀이를 불러올게요.</p>
    </main>
  </body>
</html>
